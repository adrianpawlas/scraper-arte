name: Arte Antwerp Scraper

on:
  # Scheduled run: every Saturday at 13:00 UTC
  schedule:
    - cron: '0 13 * * 6'

  # Manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Skip embeddings by default (requires Python + model download)
      # Set SKIP_EMBEDDINGS=false in GitHub Secrets to enable
      SKIP_EMBEDDINGS: ${{ vars.SKIP_EMBEDDINGS || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-siglip-${{ runner.os }}
          restore-keys: |
            huggingface-siglip-${{ runner.os }}
            huggingface-

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Install Python dependencies (for embeddings)
        if: env.SKIP_EMBEDDINGS == 'false'
        run: pip install -r requirements.txt

      - name: Build TypeScript
        run: npm run build

      - name: Run scraper
        run: node dist/index.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SKIP_EMBEDDINGS: ${{ env.SKIP_EMBEDDINGS }}
